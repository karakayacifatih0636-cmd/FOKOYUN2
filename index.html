<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra Game Store</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b1220;
    color:white;
}

/* HEADER */
header{
    background:#111c33;
    padding:20px;
    text-align:center;
}

input{
    width:80%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:8px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
    gap:15px;
    padding:20px;
}

/* CARD */
.card{
    background:#141f3a;
    border-radius:12px;
    overflow:hidden;
    cursor:pointer;
    transition:0.2s;
}

.card:hover{
    transform:scale(1.05);
}

.card img{
    width:100%;
    height:120px;
    object-fit:cover;
}

.content{
    padding:10px;
}

.small{
    font-size:12px;
    opacity:0.7;
}

.badge{
    font-size:10px;
    background:#ff3b3b;
    padding:3px 6px;
    border-radius:6px;
    display:inline-block;
    margin-top:5px;
}
</style>
</head>

<body>

<header>
<h1>🎮 ULTRA GAME STORE</h1>
<input id="search" placeholder="Oyun ara...">
</header>

<div class="grid" id="box"></div>

<script>
// 📦 OYUN VERİSİ
const games = [
{
id:1,
name:"Nebula Drift",
cat:"Racing",
desc:"Uzay yarış oyunu",
img:"https://picsum.photos/300?1",
rating:4.6,
trend:true
},
{
id:2,
name:"Shadow Loop",
cat:"Action",
desc:"Karanlık kaçış",
img:"https://picsum.photos/300?2",
rating:4.2,
trend:false
},
{
id:3,
name:"Pixel Vault",
cat:"Puzzle",
desc:"Retro bulmaca",
img:"https://picsum.photos/300?3",
rating:4.8,
trend:true
},
{
id:4,
name:"Void Runner",
cat:"Action",
desc:"Sonsuz koşu",
img:"https://picsum.photos/300?4",
rating:4.1,
trend:false
},
{
id:5,
name:"Cyber Bounce",
cat:"Action",
desc:"Zıplama oyunu",
img:"https://picsum.photos/300?5",
rating:4.0,
trend:true
}
];

// 📌 OYUNLARI GÖSTER
function render(list){
    const box = document.getElementById("box");
    box.innerHTML = "";

    list.forEach(g=>{
        box.innerHTML += `
        <div class="card">
            <img src="${g.img}">
            <div class="content">
                <h3>${g.name}</h3>
                <p class="small">${g.cat}</p>
                <p class="small">⭐ ${g.rating}</p>
                ${g.trend ? `<div class="badge">TREND</div>` : ""}
            </div>
        </div>
        `;
    });
}

render(games);

// 🔍 ARAMA
document.getElementById("search").addEventListener("input",(e)=>{
    let v = e.target.value.toLowerCase();
    let filtered = games.filter(g =>
        g.name.toLowerCase().includes(v)
    );
    render(filtered);
});
</script>

</body>
</html>
