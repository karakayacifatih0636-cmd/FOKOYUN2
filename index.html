function render(list){
let box = document.getElementById("box");
box.innerHTML = "";

list.forEach(g=>{
box.innerHTML += `
<div class="card" onclick="window.open('${g.link}','_blank')">
<img src="${g.img}">
<div class="content">
<h3>${g.name}</h3>
<p>${g.cat}</p>
<small>⭐ ${g.rating}</small>
</div>
</div>
`;
});
}

function showCat(cat){

if(cat==="all"){
  render(games);
  return;
}

render(
  games.filter(g =>
    g.cat.toLowerCase().includes(cat.toLowerCase())
  )
);

}
function randomGame(){

let random = games[Math.floor(Math.random()*games.length)];

render([random]);

}
function topRated(){

render(
 [...games]
 .sort((a,b)=>b.rating-a.rating)
 .slice(0,20)
);

}
function onlineGames(){

render(
games.filter(g =>
g.cat.toLowerCase().includes("multiplayer") ||
g.cat.toLowerCase().includes("co-op")
)
);

}
render(games);

document.getElementById("search").addEventListener("input",(e)=>{
let v = e.target.value.toLowerCase();
render(games.filter(g=>g.name.toLowerCase().includes(v)));
});

</script>
