// 📌 EKRANA BASMA SİSTEMİ
function render(list){
let box = document.getElementById("box");
box.innerHTML = "";

list.forEach(g=>{
box.innerHTML += `
<div class="card" onclick="window.open('${g.link}','_blank')">
<img src="${g.img}">
<div class="content">
<h3>${g.name}</h3>
<p>${g.cat}</p>
<small>⭐ ${g.rating}</small>
</div>
</div>
`;
});
}

// 🔍 ARAMA

});
