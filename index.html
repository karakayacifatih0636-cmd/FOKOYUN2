<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Indie Game Store</title>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:white;}
header{padding:20px;background:#111c33;text-align:center;}
input{width:80%;padding:10px;border:none;border-radius:8px;margin-top:10px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:15px;padding:20px;}
.card{background:#141f3a;border-radius:12px;overflow:hidden;cursor:pointer;}
.card img{width:100%;height:120px;object-fit:cover;}
.content{padding:10px;}
</style>
</head>

<body>

<header>
<h1>🎮 INDIE GAME STORE</h1>
<input id="search" placeholder="Oyun ara...">
</header>

<div class="grid" id="box"></div>

<script>

let games = [
{
id:1,
name:"Test Game",
cat:"Demo",
img:"https://picsum.photos/300",
rating:4.5,
link:"https://play.google.com/store/search?q=Vampire%20Survivors"
}
];

function render(list){
let box = document.getElementById("box");
box.innerHTML = "";

list.forEach(g=>{
box.innerHTML += `
<div class="card" onclick="window.open('${g.link}','_blank')">
<img src="${g.img}">
<div class="content">
<h3>${g.name}</h3>
<p>${g.cat}</p>
<small>⭐ ${g.rating}</small>
</div>
</div>
`;
});
}

render(games);

document.getElementById("search").addEventListener("input",(e)=>{
let v = e.target.value.toLowerCase();
render(games.filter(g=>g.name.toLowerCase().includes(v)));
});

</script>

</body>
</html>
